# configuración de nginx para rasa con medidas de seguridad.
# ruta sugerida: /etc/nginx/sites-available/rasa-bitbot.

# límite de peticiones para reducir abuso.
limit_req_zone $binary_remote_addr zone=rasa_limit:10m rate=10r/s;

server {
    listen 80;
    server_name rasa.bitbotfiee.xyz;
    
    # redirige http a https.
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name rasa.bitbotfiee.xyz;

    # certificados ssl.
    ssl_certificate /etc/letsencrypt/live/rasa.bitbotfiee.xyz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/rasa.bitbotfiee.xyz/privkey.pem;
    
    # parámetros ssl recomendados.
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # cabeceras de seguridad.
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # límite de peticiones en esta ubicación.
    limit_req zone=rasa_limit burst=20 nodelay;

    # cors solo desde el dominio del front.
    add_header 'Access-Control-Allow-Origin' 'https://www.bitbotfiee.xyz' always;
    add_header 'Access-Control-Allow-Methods' 'POST, GET, PUT, DELETE, OPTIONS' always;
    add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization, X-Rasa-Auth' always;
    add_header 'Access-Control-Max-Age' '86400' always;

    # preflight cors.
    if ($request_method = 'OPTIONS') {
        return 204;
    }

    # admin api (editar nlu/domain/rules/stories) vía servicio separado.
    # requiere que `rasa_admin_server.py` (o `rasa_railway_entry.py`) esté corriendo en localhost:8765.
    location ^~ /admin/api/ {
        proxy_pass http://localhost:8765;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        proxy_buffering off;
    }

    # proxy hacia rasa (chatbot runtime).
    location / {
        proxy_pass http://localhost:5005;
        proxy_http_version 1.1;
        
        # cabeceras del proxy.
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # tiempos de espera.
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        
        # buffers.
        proxy_buffering off;
    }

    # bloqueo de rutas administrativas y de estado.
    location ~ ^/(admin|status|metrics) {
        deny all;
        return 403;
    }
}
