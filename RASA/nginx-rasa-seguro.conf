# Configuración de Nginx para RASA con seguridad
# Coloca este archivo en: /etc/nginx/sites-available/rasa-bitbot

# Rate limiting para prevenir abuso
limit_req_zone $binary_remote_addr zone=rasa_limit:10m rate=10r/s;

server {
    listen 80;
    server_name rasa.bitbotfiee.xyz;
    
    # Redirigir HTTP a HTTPS
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name rasa.bitbotfiee.xyz;

    # Certificados SSL (configurar con Let's Encrypt)
    ssl_certificate /etc/letsencrypt/live/rasa.bitbotfiee.xyz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/rasa.bitbotfiee.xyz/privkey.pem;
    
    # Configuración SSL segura
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Headers de seguridad
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Rate limiting
    limit_req zone=rasa_limit burst=20 nodelay;

    # Solo permitir CORS desde tu dominio
    add_header 'Access-Control-Allow-Origin' 'https://www.bitbotfiee.xyz' always;
    add_header 'Access-Control-Allow-Methods' 'POST, GET, OPTIONS' always;
    add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization, X-Rasa-Auth' always;
    add_header 'Access-Control-Max-Age' '86400' always;

    # Manejar preflight requests
    if ($request_method = 'OPTIONS') {
        return 204;
    }

    # Autenticación básica (opcional, más seguro usar API key)
    # auth_basic "RASA API";
    # auth_basic_user_file /etc/nginx/.htpasswd;

    # Proxy a RASA
    location / {
        proxy_pass http://localhost:5005;
        proxy_http_version 1.1;
        
        # Headers del proxy
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        
        # Buffers
        proxy_buffering off;
    }

    # Bloquear acceso a rutas administrativas
    location ~ ^/(admin|status|metrics) {
        deny all;
        return 403;
    }
}







