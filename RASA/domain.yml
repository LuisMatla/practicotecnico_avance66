  utter_ask_for_afel:
  - text: "El Área de Formación de Elección Libre (AFEL) es un componente obligatorio en todos los planes de estudio de la Universidad Veracruzana (UV) para licenciaturas y TSU, cuyo objetivo es enriquecer la formación integral de los estudiantes con experiencias educativas complementarias.\n\nEstas experiencias abordan temas diversos como:\n• Derechos humanos y cultura de paz.\n• Salud y bienestar.\n• Medio ambiente y sustentabilidad.\n• Manifestaciones artísticas y culturales.\n\nLos estudiantes tienen varias opciones para cursar o acreditar el AFEL, incluyendo formatos presenciales, en línea, o virtuales a través de plataformas como EMINUS, o mediante programas especiales como \"Ven a la Cultura\" o certificaciones de idiomas.\n\nMás información: https://www.uv.mx/estudiantes/area-de-formacion-de-eleccion-libre-afel/"
  - text: "El AFEL (Área de Formación de Elección Libre) es un componente obligatorio en todos los planes de estudio de la UV para licenciaturas y TSU, que enriquece tu formación con experiencias educativas complementarias.\n\nTemas que aborda:\n• Derechos humanos y cultura de paz\n• Salud y bienestar\n• Medio ambiente y sustentabilidad\n• Manifestaciones artísticas y culturales\n\nPuedes cursarlo o acreditarlo en formatos presenciales, en línea o virtuales (EMINUS), o mediante programas como \"Ven a la Cultura\" o certificaciones de idiomas.\n\nInfo: https://www.uv.mx/estudiantes/area-de-formacion-de-eleccion-libre-afel/"
