  utter_ask_for_justificante:
  - text: "Para justificar tu inasistencia (médica, dental o por evento), tienes que entregar en la secretaría un justificante válido, ya sea médico o un documento de soporte, avalado con la firma de la autoridad.\n\nLuego, proporciona tu nombre completo, matrícula y carrera.\n\nRecuerda que, si el justificante no especifica un período, solo se justificará el día que figura en él.\n\nLa secretaría te informará la fecha de entrega del justificante final, momento en el que deberás revisar que todos tus datos y fechas sean correctos."
  - text: "El procedimiento para excusar una falta (por causas médicas, dentales o eventos) es el siguiente:\n\nPresenta en secretaría el justificante firmado y, a la vez, registra tu nombre completo, matrícula y carrera.\n\nEl documento debe establecer el periodo de la ausencia, pues de no ser así, solo se validará la fecha específica del justificante.\n\nSe te comunicará el plazo para la emisión del justificante final, el cual debes verificar al recogerlo para asegurar la precisión de tu información y el período justificado."
  - text: "Si necesitas avalar una ausencia (por motivos de salud o eventos), debes llevar a la secretaría un documento probatorio, con firma de la autoridad, junto con tu nombre, matrícula y carrera.\n\nEs importante que el justificante indique claramente el rango de la falta, ya que, si no lo hace, solo se te justificará el día que marque el documento.\n\nUna vez entregado, te informaremos el tiempo que tardaremos en prepararlo.\n\nAl recibir el justificante, revisa que tus datos y el periodo de ausencia sean exactos."
  - text: "Para formalizar una justificación de inasistencia (médica, odontológica o por evento), dirígete a secretaría para entregar el justificante firmado y proporcionar tu nombre completo, matrícula y carrera.\n\nSi el documento no cubre un periodo específico, la justificación se limitará a la fecha exacta que se muestre.\n\nLa secretaría te indicará el plazo de espera para la emisión del justificante.\n\nPor favor, verifica tus datos y el período de ausencia al momento de recogerlo."
  - text: "La validación de una falta (dentista, médico, evento) requiere que acudas a secretaría y entregues un justificante firmado por la autoridad correspondiente.\n\nAdemás, deberás proporcionar tu nombre completo, matrícula y carrera.\n\nSi el justificante no menciona el período, solo se justificará el día que contiene el documento.\n\nSe te dará un estimado de tiempo para la entrega del justificante final.\n\nCuando lo retires, asegúrate de que todos tus datos y las fechas justificadas estén bien."
  - text: "El protocolo para justificar tu falta (médica, dental, evento) implica llevar a secretaría el comprobante pertinente, firmado, y proveer tu nombre, matrícula y carrera.\n\nSi el justificante omite el período de la ausencia, esta solo quedará justificada para el día que el documento señale.\n\nUna vez recibido el comprobante inicial, te indicaremos cuándo estará listo el justificante oficial.\n\nAl recogerlo, verifica que los datos personales y el periodo de la falta sean correctos."
  - text: "Para realizar el descargo de una falta (por enfermedad, cita dental o evento), ve a secretaría con un justificante oficial y firmado.\n\nDebes indicar tu nombre completo, matrícula y carrera.\n\nTen presente que si el justificante no abarca un período, la ausencia solo se justificará por el día que aparece en él.\n\nLa secretaría te informará el tiempo de procesamiento.\n\nEs tu responsabilidad verificar la exactitud de los datos y el periodo justificado al momento de la entrega."
  - text: "Si tienes que justificar tu ausencia (por médico, dentista o evento), el primer paso es presentar el justificante firmado ante secretaría e indicar tus datos de identificación (nombre, matrícula, carrera).\n\nLa justificación cubrirá el período que el documento avale; si solo indica una fecha, solo esa fecha será justificada.\n\nLa secretaría establecerá un plazo para que recojas tu justificante final.\n\nConfirma tus datos y el periodo de ausencia al recibirlo."
  - text: "El trámite para justificar una falta (médica, dentista, evento) se inicia en secretaría, donde deberás entregar un documento de soporte con la firma de la autoridad correspondiente y anotar tu nombre, matrícula y carrera.\n\nSi el justificante no especifica un período, la falta se considerará justificada únicamente para ese día.\n\nTe informaremos el tiempo estimado para tener listo el documento final.\n\nPor favor, revisa tus datos y las fechas al recogerlo."
  - text: "Para justificar una falta (por salud o evento), es indispensable que presentes en la secretaría un justificante firmado, ya sea médico o similar, e identifiques tu nombre completo, matrícula y carrera.\n\nRecuerda: solo se justificará el periodo establecido en el documento; si no hay un periodo, solo se justifica el día.\n\nUna vez entregado, se te notificará el tiempo de espera.\n\nPor último, comprueba que el justificante final contenga tus datos y el período de ausencia sin errores."
  
  utter_ask_for_localizacion:
  - text: "La Secretaría Académica se localiza dentro de la Facultad de Ingeniería.\n\nDebes ir al edificio F, situado entre los edificios G y MICRONA, en la planta baja.\n\nBusca los laboratorios; la Secretaría se encuentra justo enfrente, identificada por una puerta de aluminio con la señalización 'Secretaría Facultad de Ingeniería Eléctrica y Electrónica' y el escudo de la Universidad Veracruzana."
  - text: "Para acceder a la Secretaría Académica, dirígete a la Facultad de Ingeniería, específicamente al edificio F.\n\nEste se encuentra flanqueado por el edificio G y el de MICRONA.\n\nUna vez en la planta baja, verás los laboratorios. Justo al frente, en el pasillo, busca la puerta de aluminio que lleva el letrero 'Secretaría Facultad de Ingeniería Eléctrica y Electrónica' y el escudo de la UV."
  - text: "La oficina de la Secretaría Académica está en la Facultad de Ingeniería.\n\nSu ubicación es en la planta baja del edificio F, el cual se sitúa entre el edificio G y la instalación de MICRONA.\n\nUna vez allí, orienta tu búsqueda hacia los laboratorios; la secretaría está justo enfrente, con una puerta de aluminio claramente marcada con el nombre 'Secretaría Facultad de Ingeniería Eléctrica y Electrónica' y el emblema de la Universidad Veracruzana."
  - text: "En la Facultad de Ingeniería encontrarás la Secretaría Académica en el edificio F (ubicado entre el edificio G y el de MICRONA).\n\nDe frente a los laboratorios, en el pasillo, verás una puerta de aluminio.\n\nEsta está señalizada con el nombre 'Secretaría Facultad de Ingeniería Eléctrica y Electrónica' y el escudo de la Universidad Veracruzana."
  - text: "Para llegar a la Secretaría Académica:\n\nEn la Facultad de Ingeniería, dirígete al edificio F, que está entre el edificio G y MICRONA.\n\nUna vez dentro de la facultad y ubicado el edificio F, ve a la planta baja.\n\nLa Secretaría está ubicada frente a los laboratorios. Búscala en el pasillo; es una puerta de aluminio con un letrero que dice 'Secretaría Facultad de Ingeniería Eléctrica y Electrónica' y el escudo de la UV."
  - text: "La localización de la Secretaría Académica es en la planta baja del edificio F, en la Facultad de Ingeniería (entre los edificios G y MICRONA).\n\nLa puerta de acceso es de aluminio, se encuentra justo frente a los laboratorios y está identificada con el nombre 'Secretaría Facultad de Ingeniería Eléctrica y Electrónica' y el escudo de la Universidad Veracruzana."
  - text: "Para ubicar la Secretaría Académica, ve a la Facultad de Ingeniería.\n\nBusca el edificio F, situado entre el edificio G y el área de MICRONA.\n\nEn la planta baja, frente a los laboratorios, en el pasillo, encontrarás la puerta de aluminio de la Secretaría, con su respectiva señalización institucional ('Secretaría Facultad de Ingeniería Eléctrica y Electrónica', Universidad Veracruzana)."
  - text: "La Secretaría Académica se halla en el edificio F de la Facultad de Ingeniería, ubicado entre el edificio G y el de MICRONA.\n\nEs en la planta baja, cruzando el pasillo desde los laboratorios.\n\nLa reconocerás por su puerta de aluminio con la inscripción 'Secretaría Facultad de Ingeniería Eléctrica y Electrónica' y el escudo de la Universidad."
  - text: "Debes ir a la Facultad de Ingeniería, al edificio F, el cual colinda con el edificio G y MICRONA.\n\nLa Secretaría Académica está en la planta baja.\n\nBusca los laboratorios y justo enfrente, en el pasillo, hallarás la puerta de aluminio que está señalizada como 'Secretaría Facultad de Ingeniería Eléctrica y Electrónica' con el escudo de la UV."
  - text: "La oficina de la Secretaría de la Facultad de Ingeniería Eléctrica y Electrónica (Secretaría Académica) se encuentra en la Universidad Veracruzana.\n\nVe al edificio F (entre G y MICRONA) en la planta baja, frente a los laboratorios.\n\nBusca la puerta de aluminio que tiene el escudo universitario y el nombre 'Secretaría Facultad de Ingeniería Eléctrica y Electrónica'."

  utter_ask_for_avisos:
  - text: "Los anuncios referentes a la Secretaría Académica o de importancia en la facultad, los puedes encontrar en el canal de Teams 'ALUMNOS - FIEE'.\n\nEn las secciones:\n• 'General'\n• 'Tutorias'\n• 'Vinculación y Servicio Social'\n\nY en el canal respectivo de tu carrera:\n• 'Ingeniería Informática'\n• 'Ingeniería Electrónica'\n• 'Ingeniería Mecatrónica'"
  - text: "Puedes encontrar los anuncios de la Secretaría Académica y demás información relevante de la facultad en el equipo de Teams 'ALUMNOS - FIEE'.\n\nEspecíficamente en los canales:\n• 'General'\n• 'Tutorias'\n• 'Vinculación y Servicio Social'\n\nY en el canal propio de tu programa educativo:\n• 'Ingeniería Informática'\n• 'Ingeniería Electrónica'\n• 'Ingeniería Mecatrónica'"
  - text: "La información de la Secretaría Académica y anuncios cruciales de la facultad se publican en Teams, en el canal 'ALUMNOS - FIEE'.\n\nDentro de las pestañas:\n• 'General'\n• 'Tutorias'\n• 'Vinculación y Servicio Social'\n\nY en los canales específicos de carrera:\n• 'Ingeniería Informática'\n• 'Ingeniería Electrónica'\n• 'Ingeniería Mecatrónica'"
  - text: "Consulta todos los comunicados de la Secretaría Académica o avisos importantes de la facultad a través del canal de Teams 'ALUMNOS - FIEE'.\n\nUsando las siguientes ubicaciones:\n• 'General'\n• 'Tutorias'\n• 'Vinculación y Servicio Social'\n\nAdemás de tu canal de carrera:\n• 'Ingeniería Informática'\n• 'Ingeniería Electrónica'\n• 'Ingeniería Mecatrónica'"
  - text: "Para estar al tanto de los avisos de la Secretaría Académica y de la facultad, dirígete al equipo de Teams 'ALUMNOS - FIEE'.\n\nLos canales a revisar son:\n• 'General'\n• 'Tutorias'\n• 'Vinculación y Servicio Social'\n\nY el correspondiente a tu Ingeniería:\n• 'Ingeniería Informática'\n• 'Ingeniería Electrónica'\n• 'Ingeniería Mecatrónica'"
  - text: "Los anuncios de la Secretaría Académica de la FIEE se difunden a través del canal de Teams 'ALUMNOS - FIEE'.\n\nBusca en las secciones principales:\n• 'General'\n• 'Tutorias'\n• 'Vinculación y Servicio Social'\n\nO en la de tu especialidad:\n• 'Ingeniería Informática'\n• 'Ingeniería Electrónica'\n• 'Ingeniería Mecatrónica'"
  - text: "Todos los referentes a la Secretaría Académica o de interés para la FIEE están disponibles en el equipo de Teams llamado 'ALUMNOS - FIEE'.\n\nLos canales de consulta son:\n• 'General'\n• 'Tutorias'\n• 'Vinculación y Servicio Social'\n\nY el de tu área:\n• 'Ingeniería Informática'\n• 'Ingeniería Electrónica'\n• 'Ingeniería Mecatrónica'"
  - text: "La facultad publica los avisos de la Secretaría Académica en la plataforma Teams.\n\nAccede al canal 'ALUMNOS - FIEE' y revisa los canales:\n• 'General'\n• 'Tutorias'\n• 'Vinculación y Servicio Social'\n\nY los específicos:\n• 'Ingeniería Informática'\n• 'Ingeniería Electrónica'\n• 'Ingeniería Mecatrónica'"
  - text: "Información relevante de la Secretaría Académica y de la facultad está en Teams.\n\nEntra al equipo 'ALUMNOS - FIEE' y navega por:\n• 'General'\n• 'Tutorias'\n• 'Vinculación y Servicio Social'\n\nO el canal de tu carrera:\n• 'Ingeniería Informática'\n• 'Ingeniería Electrónica'\n• 'Ingeniería Mecatrónica'"
  - text: "En el canal de Teams 'ALUMNOS - FIEE' hallarás los avisos de la Secretaría Académica y de la facultad.\n\nRevisa las secciones:\n• 'General'\n• 'Tutorias'\n• 'Vinculación y Servicio Social'\n\nY la pestaña de tu carrera:\n• 'Ingeniería Informática'\n• 'Ingeniería Electrónica'\n• 'Ingeniería Mecatrónica'"

  utter_ask_for_baja_materia:
  - text: "Sí, la baja se tramita en la secretaría.\n\nPrimero que nada, debes estar seguro de dos cosas: que quieres dar de baja realmente la materia, y que los motivos por los cuáles quieres darla de baja sean realmente justificables.\n\nAhora, te explicaré lo siguiente:\n\n• Tienes 5 bajas durante toda la carrera, posterior a agotarlas, ya no podrás dar ninguna materia de baja.\n\n• Hay un periodo llamado 'semana de bajas' que es al inicio del semestre, y durante ese periodo puedes dar de baja materias sin una justificación que sustente.\n\n• Fuera de este periodo, el proceso es el siguiente:\n  1. Acude a la secretaría\n  2. Presenta tus documentos para la baja de tu materia que avalen o justifiquen dicha baja para presentarse a consejo técnico\n  3. Espera a que se te notifique si se te dio de baja en tu portal de MIUV\n\n(OJO: sigue asistiendo a tus clases hasta que la baja sea confirmada)."
  - text: "Efectivamente, el trámite de baja se realiza en la secretaría.\n\nEs crucial que estés completamente seguro de la decisión y que tus razones sean válidas.\n\nRecuerda que solo dispones de 5 oportunidades de baja en toda la carrera.\n\nDurante la 'semana de bajas' (al inicio del semestre), el proceso es directo, pero después de esa ventana, debes acudir a la secretaría con documentos que justifiquen tu solicitud.\n\nEsta será presentada al Consejo Técnico y la resolución se notificará en tu portal MIUV.\n\n(Importante: Asiste a clases hasta que la baja se refleje oficialmente)."
  - text: "Sí, el procedimiento de baja se lleva a cabo en la secretaría, pero antes debes reflexionar si deseas realmente dar de baja la materia y si tienes justificación.\n\nTienes un límite de 5 bajas durante toda la carrera.\n\nExiste una 'semana de bajas' temprana en la que no requieres justificación.\n\nFuera de ese lapso, debes ir a secretaría, entregar la documentación probatoria para que se someta a Consejo Técnico y esperar la notificación final en MIUV.\n\n(Advertencia: Sigue asistiendo a la clase hasta recibir la confirmación de baja)."
  - text: "La baja se gestiona en la secretaría, bajo la condición de que estés seguro de la decisión y que los motivos sean justificables.\n\nSolo se permiten 5 bajas en toda la trayectoria académica.\n\nLa 'semana de bajas' inicial permite la baja sin justificación.\n\nPasado ese tiempo, debes presentar la documentación justificativa en secretaría para la revisión del Consejo Técnico, y la aprobación será visible en tu portal MIUV.\n\n(ATENCIÓN: No dejes de asistir a clase hasta la notificación oficial de baja)."
  - text: "Para dar de baja una materia, debes tramitarlo en la secretaría.\n\nConfirma que tu deseo de baja es firme y está debidamente justificado.\n\nTienes 5 oportunidades de baja totales en la carrera.\n\nHay un periodo sin justificación ('semana de bajas') al inicio del semestre.\n\nSi estás fuera de él, el proceso implica llevar tu justificación a secretaría para el Consejo Técnico y esperar la resolución en MIUV.\n\n(NOTA: Continúa asistiendo a la materia hasta que la baja sea confirmada)."
  - text: "Sí, la secretaría es la encargada de la baja.\n\nPrimero, considera si realmente la necesitas y si tienes motivos justificables, ya que solo tienes 5 bajas disponibles en la carrera.\n\nLa 'semana de bajas' inicial no requiere justificación.\n\nSi el periodo ha pasado, debes ir a secretaría con documentos de soporte.\n\nLa solicitud se evaluará en Consejo Técnico y la confirmación se verá en tu portal MIUV.\n\n(RECUERDA: La asistencia a clases es obligatoria hasta que la baja sea oficial)."
  
  utter_ask_for_acr_ingles:
  - text: "Para acreditar inglés necesitas cubrir desde básico I hasta Intermedio I, y puedes optar por las siguientes opciones:\n\n1. Realizar examen de certificación EXAVER 2 que cubre los niveles básico I, II y III, intermedio I, II y III y una vez obtenido el certificado, tramitar un 'Dictamen' que avale tu certificación.\n\n2. Cursar los semestres de cada nivel (ya sea inscribiéndolas en la IL o en el centro de idiomas como público general).\n\nAhora, el trámite es el siguiente:\n\nUna vez que inscribas la materia 'Acreditación del Idioma Inglés' el secretario se pondrá en contacto contigo durante el semestre, para que envíes tus respectivas evidencias a secfiee@uv.mx.\n\nPor último, esperarás a que tu calificación se vea reflejada en tu portal de MIUV."
  - text: "La acreditación de inglés requiere cubrir los niveles desde básico I hasta Intermedio I.\n\nTienes dos opciones principales:\n\n1. Presentar el examen de certificación EXAVER 2 (que evalúa hasta Intermedio III) y, al obtenerlo, gestionar un 'Dictamen' para validarlo.\n\n2. Completar todos los semestres de cada nivel (ya sea mediante la Inscripción Libre o como público en el centro de idiomas).\n\nEl procedimiento es:\n\nInscribe la materia 'Acreditación del Idioma Inglés', y el secretario te contactará en ese semestre para que remitas tus evidencias a secfiee@uv.mx.\n\nFinalmente, la calificación aparecerá en tu portal MIUV."
  - text: "Para validar el idioma inglés, es indispensable tener cubierto de básico I a Intermedio I.\n\nLas alternativas son:\n\n1. Certificarte con el examen EXAVER 2 (abarca hasta el Intermedio III) y luego solicitar el 'Dictamen' de acreditación con dicho certificado.\n\n2. Tomar y aprobar los niveles semestrales requeridos (mediante Inscripción Libre o vía centro de idiomas, modalidad público general).\n\nUna vez inscrita la unidad de aprendizaje 'Acreditación del Idioma Inglés', el secretario te contactará para que le envíes los comprobantes a secfiee@uv.mx.\n\nLa nota final se verá en tu portal de MIUV."
  - text: "Si buscas la acreditación de inglés, debes alcanzar del nivel básico I al Intermedio I.\n\nHay dos caminos:\n\n1. Obtener la certificación EXAVER 2, la cual valida múltiples niveles, y posteriormente solicitar el 'Dictamen' correspondiente.\n\n2. Estudiar cada nivel en los semestres correspondientes (Inscripción Libre o curso para público general en el centro de idiomas).\n\nEl proceso inicia al inscribir la materia 'Acreditación del Idioma Inglés'; el secretario te pedirá las evidencias a través de secfiee@uv.mx en el transcurso del semestre, y solo resta esperar la publicación de la calificación en MIUV."
  - text: "El requisito de inglés se acredita cubriendo los niveles básico I hasta Intermedio I.\n\nLas opciones disponibles son:\n\n1. Aprobar el examen de certificación EXAVER 2 (que cubre de Básico I a Intermedio III) y tramitar el 'Dictamen' oficial con el certificado.\n\n2. Inscribir y aprobar cada uno de los semestres de idiomas (mediante la IL o como alumno externo del centro de idiomas).\n\nEn cuanto inscribas 'Acreditación del Idioma Inglés', el secretario te contactará para que envíes las evidencias necesarias a secfiee@uv.mx, y después de eso, la calificación se subirá a tu portal de MIUV."

  utter_ask_for_tutor:
  - text: "MIUV → Guía del estudiante → Modelo Educativo. Ahí encontrarás la información de tu tutor y contacto, además de tu programa educativo, tu Área Académica Técnica y el campus al que perteneces."
  - text: "Entra al MIUV, sigue la ruta Guía del estudiante y luego Modelo Educativo. Verás tu tutor, datos de contacto, programa educativo, Área Académica Técnica y campus."
  - text: "Para conocer a tu tutor, ve a MIUV → Guía del estudiante → Modelo Educativo. También se muestra tu información de contacto, programa, Área Académica Técnica y campus asignado."
  - text: "En el portal MIUV, selecciona Guía del estudiante y después Modelo Educativo. Allí está el nombre y contacto de tu tutor, además de tu carrera, Área Académica Técnica y campus."
  - text: "La información sobre tu tutor (nombre y contacto) se encuentra en MIUV en la sección Guía del estudiante → Modelo Educativo. Aparecen también datos de tu programa, Área Académica Técnica y campus."
  - text: "Dirígete a MIUV, busca la Guía del estudiante y luego el apartado Modelo Educativo. Esto te revelará quién es tu tutor, su contacto, tu carrera, tu Área Académica Técnica y tu campus."
  - text: "Consulta la información de tu tutor en MIUV, siguiendo estos pasos: Guía del estudiante, y luego Modelo Educativo. Se incluyen detalles como contacto, el programa educativo, Área Académica Técnica y el campus."
  - text: "Ingresa a MIUV, navega hasta Guía del estudiante y pulsa en Modelo Educativo. Podrás ver los datos de tu tutor y contacto, así como tu programa, Área Académica Técnica y campus."
  - text: "Tu tutor y su contacto, junto con el programa educativo, el Área Académica Técnica y el campus, están visibles en MIUV en la ruta Guía del estudiante → Modelo Educativo."
  - text: "Para obtener los detalles de tu tutor, usa el camino MIUV → Guía del estudiante → Modelo Educativo. Además, se te brindan datos sobre tu Área Académica Técnica, campus y programa educativo."

  utter_ask_for_IL:
  - text: "IL (Inscripción en línea) Es el proceso que debes realizar en una fecha y hora indicada para ser INSCRITO y conformar tu horario del siguiente período escolar.\nTu inscripción queda finalizada hasta que realizas el pago establecido en el formato que se te emite al concluir tu IL. \nLa fecha y hora en que debes inscribirte en línea se informará previamente, por lo que debes estar al pendiente de la página informativa IL que se publica en el Portal de Estudiantes sobre la Inscripción en Línea."
  - text: "IL (Inscripción en Línea) es el trámite que realizas en una hora y fecha específica para formalizar tu INSCRIPCIÓN y crear tu horario del próximo semestre.\n\nRecuerda: Tu inscripción se completa únicamente cuando efectúas el pago indicado en el formato que se genera al finalizar el proceso de IL.\n\nMantente atento a la página informativa IL en el Portal de Estudiantes, donde se publicará la fecha y hora exacta de tu proceso."
  - text: "La IL, o Inscripción en Línea, es el paso obligatorio que te permite ser INSCRITO y seleccionar las materias de tu horario para el siguiente ciclo.\nLa inscripción solo es válida y finaliza una vez que se realiza el pago establecido, cuyo formato se te proporciona al concluir tu IL.\nLa hora y fecha para tu Inscripción en Línea serán comunicadas con antelación. Revisa siempre el Portal de Estudiantes y la página informativa IL."
  - text: "La Inscripción en Línea (IL) es el procedimiento calendarizado donde te INScribes y estructuras tu horario para el siguiente período académico.\n\nImportante: El pago es el último paso. Tu inscripción no se considera finalizada hasta que pagues el monto que se emite al terminar la IL.\n\nLa fecha y hora específicas para tu IL se te notificarán. Busca la información en la página informativa IL dentro del Portal de Estudiantes."
  - text: "IL (Inscripción en Línea) es el proceso clave para tu INSCRIPCIÓN y la conformación de tu carga académica (horario) para el nuevo ciclo escolar.\n\nEl cierre de tu IL está condicionado al pago. Debes realizar el pago correspondiente emitido al finalizar el proceso para que tu inscripción sea definitiva.\n\nTe pedimos consultar regularmente la página informativa IL en el Portal de Estudiantes, ya que ahí se indica la fecha y hora exactas de tu inscripción."
  - text: "Se refiere a la IL (Inscripción en Línea), el proceso mediante el cual te registras como INSCRITO y defines tu horario para el próximo período escolar.\n\nTen en cuenta que tu inscripción está sujeta a la realización del pago. El formato de pago se genera al concluir la IL.\n\nLas fechas y horarios de inscripción son programados. Verifica la página informativa IL que se publica en el Portal de Estudiantes para conocer el día que te corresponde."
  - text: "La IL (Inscripción en Línea) es el mecanismo digital para asegurar tu INSCRIPCIÓN y armar el horario de clases que cursarás en el siguiente período.\nEl proceso de IL culmina y se valida al liquidar el pago que se te proporciona en el formato al final de la inscripción.\nLa fecha y hora precisas para que ingreses a la IL serán publicadas previamente. Es indispensable revisar el Portal de Estudiantes y la página IL."
  - text: "El proceso de Inscripción en Línea (IL) es la cita virtual para concretar tu INSCRIPCIÓN y configurar tu horario para el ciclo venidero.\n\nLa única manera de completar tu inscripción es efectuando el pago indicado en el formato generado al finalizar la IL.\n\nPor favor, mantente alerta a la fecha y hora de inscripción que se comunica por medio de la página informativa IL en el Portal de Estudiantes."
  - text: "Hablamos de la Inscripción en Línea (IL): el proceso obligatorio en fecha y hora designada para que quedes INSCRITO y selecciones las asignaturas de tu horario.\nRecuerda que la inscripción finaliza solo después de realizar el pago estipulado, el cual se te entrega en un formato al terminar la IL.\nLa información sobre tu hora y fecha de inscripción se publica en la página informativa IL que encontrarás en el Portal de Estudiantes. ¡Revísala!"
  - text: "La IL significa Inscripción en Línea. Es el momento donde confirmas tu INSCRIPCIÓN y diseñas tu horario para el siguiente semestre o cuatrimestre.\n\nEl paso final y crucial para validar la IL es el pago, cuyo formato se te proporciona inmediatamente después de concluir el registro de materias.\n\nTu fecha y hora exacta de IL se publicarán en el Portal de Estudiantes, en la sección de la página informativa IL. ¡No la pierdas de vista!"
  - text: "IL (Inscripción en Línea) es el trámite que te permite INSCRIPCIÓN formal y la selección de tu carga horaria para el próximo ciclo.\n\nLa inscripción se considera terminada una vez que el pago establecido en el formato emitido al finalizar la IL ha sido cubierto.\n\nConsulta la página informativa IL en el Portal de Estudiantes, ya que ahí se dará a conocer la fecha y hora exactas en que debes realizar tu Inscripción en Línea."

  utter_ask_for_Planea:
  - text: " El PLANEA es la sesión que realizas con tu tutor para seleccionar las materias que estarán en tu carga preventiva cuando hagas tu inscripción para el siguiente semestre.\nSu función es hacer un “senso” de las materias que necesitarán apertura, dándole prioridad a las de mayor demanda."
  - text: "El PLANEA es el encuentro con tu tutor cuyo objetivo es preseleccionar las asignaturas que formarán parte de tu carga académica en el próximo semestre, antes de la inscripción.\n\nLa finalidad del PLANEA es crear un 'conteo' anticipado de la demanda de materias, lo cual permite a la institución priorizar la apertura de los grupos más solicitados."
  - text: "PLANEA consiste en una reunión obligatoria con tu tutor para ayudarte a elegir las materias que cargarás preventivamente. Esto precede a tu Inscripción en Línea (IL).\nSu servicio principal es realizar una 'estimación' de qué materias tendrán mayor demanda, asegurando que se ofrezcan suficientes grupos para las asignaturas clave."
  - text: "La sesión PLANEA es donde, junto a tu tutor, defines las materias que deseas cursar. Estas se registran como tu carga académica 'tentativa' para el siguiente periodo escolar.\n\nEl propósito esencial de PLANEA es medir la demanda de cupos por asignatura, lo que nos ayuda a priorizar la apertura de grupos con base en la necesidad real de los estudiantes."
  - text: "PLANEA es el proceso de planeación guiada por tu tutor. En esta sesión, seleccionas tus materias para que aparezcan como 'precarga' al momento de la inscripción formal.\nSu utilidad principal es obtener un 'censo' anticipado de la demanda de materias. Así, la escuela puede gestionar mejor los recursos y garantizar la disponibilidad de grupos necesarios."
  - text: "La dinámica PLANEA implica una consulta con tu tutor para determinar qué materias incluirás en tu carga 'preventiva' para el siguiente semestre, facilitando luego tu inscripción.\n\nEste proceso es fundamental para hacer una 'proyección' de las materias más solicitadas. De esta forma, podemos asegurar que las asignaturas de alta demanda tengan la prioridad de apertura de grupos."
  - text: "El PLANEA es el mecanismo mediante el cual se te orienta, con ayuda de tu tutor, a seleccionar las materias que integrarán tu horario. Esta selección es la base de tu carga preventiva.\nLa razón de ser del PLANEA es funcionar como un 'indicador de demanda', permitiendo a la administración priorizar la apertura de grupos y optimizar la oferta académica."
  - text: "Consiste en la reunión PLANEA que llevas a cabo con tu tutor. Su objetivo es generar tu carga 'provisional' de materias antes del inicio de la inscripción en línea del próximo semestre.\n\nLa utilidad de esta sesión es medir qué materias necesitan más grupos. Se usa para hacer una 'toma de decisiones' informada, dando preferencia a las asignaturas de mayor interés estudiantil."
  - text: "PLANEA es el espacio de asesoría con tu tutor para que elijas las asignaturas que compondrán tu carga 'sugerida' para el próximo período. Esto agiliza tu proceso de inscripción posterior.\nSirve para obtener datos de 'preinscripción'. La información recolectada es usada para priorizar y garantizar la apertura de grupos para aquellas materias donde la demanda es más alta."
  - text: "El proceso PLANEA es la cita con el tutor para seleccionar la lista de materias que deseas cursar en el semestre venidero. Esta lista se convierte en tu carga preventiva.\n\nSu finalidad primordial es ejecutar un 'cálculo de demanda'. Esto permite que se priorice la asignación de recursos y la apertura de grupos para las materias que muestren mayor solicitud por parte del alumnado."

  utter_ask_for_CambioTutor:
  - text: "(IMPORTANTE!) Con base en el organigrama 'Cambios de tutor solicitados por alumnos' obtenido de: https://www.uv.mx/instru/files/2015/08/P02_Cambio-de-tutor.pdf\n\n Para cambiar de tutor, debe seguir el proceso de tres pasos:\n\n1. INICIO: Solicite el Formato FIE-TT-02-01 de 'Cambio de tutor' al Coordinador de tutorías de la FIE.\n\n2. REVISIÓN: El Coordinador evaluará tres puntos:\n   - Que el cambio esté habilitado en el SIT.\n   - Que usted no haya solicitado el cambio en más de tres ocasiones previas.\n   - Que haya disponibilidad de un nuevo tutor para asignarle.\n\n3. RESULTADO:\n   - Si los tres puntos son SÍ: Se autoriza el cambio y se le notifica a usted y al nuevo tutor (Formato FIE-TT-02-02).\n   - Si alguno es NO: Se le negará el cambio (Formato FIE-TT-02-03) y el proceso finaliza."
  - text: "(IMPORTANTE!) Según el organigrama 'Cambios de tutor solicitados por alumnos' disponible en: https://www.uv.mx/instru/files/2015/08/P02_Cambio-de-tutor.pdf\n\nEl proceso para cambiar de tutor consta de tres etapas:\n\nETAPA 1 - INICIO: Debe solicitar el Formato FIE-TT-02-01 de 'Cambio de tutor' al Coordinador de tutorías de la FIE.\n\nETAPA 2 - REVISIÓN: El Coordinador verificará tres aspectos:\n   • Que el cambio se encuentre habilitado en el SIT.\n   • Que no haya solicitado el cambio más de tres veces anteriormente.\n   • Que exista disponibilidad de un nuevo tutor para asignarle.\n\nETAPA 3 - RESULTADO:\n   • Si se cumplen los tres aspectos: Se autoriza el cambio y se notifica a usted y al nuevo tutor mediante el Formato FIE-TT-02-02.\n   • Si algún aspecto no se cumple: Se deniega el cambio con el Formato FIE-TT-02-03 y el proceso termina."
  - text: "(IMPORTANTE!) Basado en el organigrama 'Cambios de tutor solicitados por alumnos' de: https://www.uv.mx/instru/files/2015/08/P02_Cambio-de-tutor.pdf\n\nPara realizar el cambio de tutor, siga estos tres pasos:\n\nPASO 1 - INICIO: Solicite al Coordinador de tutorías de la FIE el Formato FIE-TT-02-01 de 'Cambio de tutor'.\n\nPASO 2 - REVISIÓN: El Coordinador revisará tres condiciones:\n   1. Que el cambio esté habilitado en el SIT.\n   2. Que no haya solicitado el cambio en más de tres ocasiones previas.\n   3. Que haya disponibilidad de un nuevo tutor para asignarle.\n\nPASO 3 - RESULTADO:\n   • Cumpliendo las tres condiciones: Se aprueba el cambio y se le notifica a usted y al nuevo tutor (Formato FIE-TT-02-02).\n   • Si alguna condición no se cumple: Se rechaza el cambio (Formato FIE-TT-02-03) y el proceso concluye."
  - text: "(IMPORTANTE!) De acuerdo con el organigrama 'Cambios de tutor solicitados por alumnos' en: https://www.uv.mx/instru/files/2015/08/P02_Cambio-de-tutor.pdf\n\nEl cambio de tutor requiere seguir un proceso de tres fases:\n\nFASE 1 - INICIO: Diríjase al Coordinador de tutorías de la FIE para solicitar el Formato FIE-TT-02-01 de 'Cambio de tutor'.\n\nFASE 2 - REVISIÓN: El Coordinador analizará tres requisitos:\n   a) Que el cambio esté habilitado en el SIT.\n   b) Que usted no haya solicitado el cambio en más de tres ocasiones previas.\n   c) Que haya disponibilidad de un nuevo tutor para asignarle.\n\nFASE 3 - RESULTADO:\n   ✓ Si los tres requisitos se cumplen: Se autoriza el cambio y se le comunica a usted y al nuevo tutor (Formato FIE-TT-02-02).\n   ✗ Si algún requisito no se cumple: Se niega el cambio (Formato FIE-TT-02-03) y el proceso se cierra."
  - text: "(IMPORTANTE!) Referencia: organigrama 'Cambios de tutor solicitados por alumnos' en https://www.uv.mx/instru/files/2015/08/P02_Cambio-de-tutor.pdf\n\nPara cambiar de tutor, debe completar tres etapas:\n\nETAPA 1 - INICIO: Obtenga el Formato FIE-TT-02-01 de 'Cambio de tutor' del Coordinador de tutorías de la FIE.\n\nETAPA 2 - REVISIÓN: El Coordinador examinará tres criterios:\n   → El cambio debe estar habilitado en el SIT.\n   → No debe haber solicitado el cambio más de tres veces previamente.\n   → Debe haber disponibilidad de un nuevo tutor para asignarle.\n\nETAPA 3 - RESULTADO:\n   → Si cumple los tres criterios: Se aprueba el cambio y se le informa a usted y al nuevo tutor (Formato FIE-TT-02-02).\n   → Si no cumple algún criterio: Se rechaza el cambio (Formato FIE-TT-02-03) y el proceso finaliza."

  utter_ask_for_Requisitos_CambioCarrera:
  - text: "El cambio de programa educativo está disponible para alumnos de planes de estudio flexibles que cumplen dos requisitos clave: \n\nHaber acreditado todas las materias del Área de Formación Básica General (Lectura/Redacción, Computación, Habilidades del Pensamiento, Inglés I y II). \nContar con el 12% de los créditos de las Áreas de Formación de Iniciación a la Disciplina, Disciplinar y Terminal."
  - text: "Para solicitar el cambio de programa educativo, los estudiantes de planes flexibles deben cumplir con dos requisitos fundamentales:\n\n1. Tener acreditadas todas las materias del Área de Formación Básica General, que incluye: Lectura/Redacción, Computación, Habilidades del Pensamiento, Inglés I y II.\n\n2. Poseer el 12% de los créditos correspondientes a las Áreas de Formación de Iniciación a la Disciplina, Disciplinar y Terminal."
