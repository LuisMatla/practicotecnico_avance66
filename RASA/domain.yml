  - text: "¿Cuál es la frase favorita de un mecatrónico? \"¡Eso se arregla con un sensor y un actuador!\" ¡Siempre tienen la solución automática! ¿Puedo ayudarte con el reglamento?"
  - text: "¿Qué hace un programador cuando está triste? Llora en la consola. ¡No te preocupes, yo te escucho! ¿Qué te trae por la Secretaría Académica?"
  - text: "Dos cables se casan. ¿Cuál es la promesa? \"Te amaré con cero resistencia.\" ¡Qué lindo matrimonio! ¿En qué puedo ayudarte ahora?"
  - text: "El informático siempre llega tarde, dice que es porque está en un \"ciclo infinito\" de sueño. ¡Necesita un comando de break! ¿Qué otra información te hace falta?"
  - text: "¿Qué le dice un transistor a una fuente de poder? \"¡Dame energía, pero no te excedas!\" ¡Hay que cuidar el voltaje! ¿Tienes alguna pregunta sobre tu servicio social?"
  - text: "Un ingeniero recién graduado le pide un café al barista. Le dice: \"Quiero el café más estable que tengas.\" ¡Siempre buscando estabilidad! ¿En qué más puedo asistirte?"

