  utter_ask_for_porcentaje_trayectoria:
  - text: "Consulta tu porcentaje de trayectoria en el Portal de Estudiantes UV (zMATRICULA@estudiantes.uv.mx) MIUV -> Guía del Estudiante -> Trayectoria Escolar o acude a la Secretaría Administrativa de la FIEE, ya que se basa en créditos aprobados sobre totales del plan de estudios. Como estudiante universitario puedes decidir en cuánto tiempo quieres egresar de tu plan de estudios. Para hacerlo, debes tener siempre actualizada tu trayectoria escolar y hacer una proyección de periodos escolares regulares por cursar. ¿En qué más puedo ayudarte?"
  - text: "Para conocer tu porcentaje de trayectoria, puedes acceder al Portal de Estudiantes UV con tu cuenta (zMATRICULA@estudiantes.uv.mx), ingresar a MIUV -> Guía del Estudiante -> Trayectoria Escolar. También puedes acudir presencialmente a la Secretaría Administrativa de la FIEE. El porcentaje se calcula con base en los créditos aprobados sobre el total de créditos de tu plan de estudios. Recuerda que como estudiante puedes decidir en cuánto tiempo quieres egresar, por lo que es importante mantener actualizada tu trayectoria escolar y proyectar los periodos escolares regulares que te faltan por cursar. ¿Necesitas ayuda con algo más?"
  - text: "Tu porcentaje de trayectoria lo puedes consultar en el Portal de Estudiantes UV (zMATRICULA@estudiantes.uv.mx) en la sección MIUV -> Guía del Estudiante -> Trayectoria Escolar. Si prefieres atención presencial, puedes acudir a la Secretaría Administrativa de la FIEE. Este porcentaje se basa en los créditos aprobados sobre el total de créditos de tu plan de estudios. Es importante que mantengas actualizada tu trayectoria escolar y hagas una proyección de los periodos escolares regulares que te faltan por cursar, ya que como estudiante puedes decidir en cuánto tiempo quieres egresar. ¿Qué otra información necesitas?"
  - text: "Para saber tu porcentaje de trayectoria, accede al Portal de Estudiantes UV con tu cuenta (zMATRICULA@estudiantes.uv.mx), ve a MIUV -> Guía del Estudiante -> Trayectoria Escolar. También puedes visitar la Secretaría Administrativa de la FIEE. El porcentaje se calcula considerando los créditos aprobados sobre el total de créditos de tu plan de estudios. Como estudiante universitario, puedes decidir en cuánto tiempo quieres egresar, por lo que es fundamental tener actualizada tu trayectoria escolar y proyectar los periodos escolares regulares que te faltan por cursar. ¿Puedo ayudarte con algo más?"
  - text: "El porcentaje de trayectoria lo encuentras en el Portal de Estudiantes UV (zMATRICULA@estudiantes.uv.mx) en MIUV -> Guía del Estudiante -> Trayectoria Escolar, o puedes acudir a la Secretaría Administrativa de la FIEE. Este porcentaje refleja los créditos aprobados sobre el total de créditos de tu plan de estudios. Recuerda que puedes decidir en cuánto tiempo quieres egresar, así que mantén actualizada tu trayectoria escolar y haz una proyección de los periodos escolares regulares que te faltan por cursar. ¿En qué más puedo asistirte?"
  - text: "Para consultar tu porcentaje de trayectoria, ingresa al Portal de Estudiantes UV con tu cuenta (zMATRICULA@estudiantes.uv.mx), dirígete a MIUV -> Guía del Estudiante -> Trayectoria Escolar. Si prefieres atención personalizada, acude a la Secretaría Administrativa de la FIEE. El porcentaje se basa en los créditos aprobados sobre el total de créditos de tu plan de estudios. Como estudiante, puedes decidir en cuánto tiempo quieres egresar, por lo que es esencial mantener actualizada tu trayectoria escolar y proyectar los periodos escolares regulares que te faltan por cursar. ¿Qué otra consulta tienes?"
  - text: "Tu porcentaje de trayectoria está disponible en el Portal de Estudiantes UV (zMATRICULA@estudiantes.uv.mx) en la ruta MIUV -> Guía del Estudiante -> Trayectoria Escolar. También puedes obtener esta información en la Secretaría Administrativa de la FIEE. El cálculo se realiza con base en los créditos aprobados sobre el total de créditos de tu plan de estudios. Como estudiante universitario, puedes decidir en cuánto tiempo quieres egresar, así que asegúrate de tener actualizada tu trayectoria escolar y hacer una proyección de los periodos escolares regulares que te faltan por cursar. ¿Necesitas más información?"

