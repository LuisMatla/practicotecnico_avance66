  - text: "¿Por qué el informático rompió con su novia? Porque ella tenía demasiados \"errores de sintaxis\". ¡Esa relación no compiló! ¿En qué puedo ayudarte ahora?"
  - text: "Un ingeniero mecatrónico nunca tiene queja, solo tiene un \"fallo en el sistema de retroalimentación\". ¡A veces pasa! ¿Alguna duda sobre tu plan de estudios?"
