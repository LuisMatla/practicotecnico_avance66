responses:
  utter_saludo:
  - text: "Hola, soy Bit, tu asistente de Secretaría de la FIEE. ¿En qué puedo ayudarte hoy?"
  - text: "Saludos. Soy Bit, el asistente virtual de la FIEE. Dime, ¿qué trámite o información necesitas?"
  - text: "Bienvenido/a a la Secretaría. Soy Bit, tu soporte inteligente. ¿Cómo te asisto en tus consultas académicas?"
  - text: "¡Hola! Soy Bit, el bot de información de la FIEE. Estoy aquí para ayudarte a navegar por la Secretaría. ¿Qué tienes en mente?"
  - text: "FIEE presente. Soy Bit, tu guía digital en la Secretaría. ¿Qué deseas consultar hoy?"
  - text: "Listo para ayudarte. Soy Bit, el asistente de la Secretaría. Cuéntame, ¿qué información requieres sobre tu carrera?"
  - text: "Hola de nuevo. Soy Bit, tu contacto rápido con la Secretaría de la FIEE. ¿Qué hacemos hoy?"
  - text: "Un placer. Soy Bit, el sistema de apoyo para Ingeniería Informática, Mecatrónica y Electrónica. ¿Cuál es tu pregunta?"
  - text: "Accediendo a la información... Soy Bit, el asistente oficial de la FIEE. ¿En qué puedo serte de utilidad en este momento?"
  - text: "Hola. Aquí Bit, tu mano derecha digital en la Secretaría. ¿Qué información académica puedo procesar por ti?"

  utter_goodbye:
  - text: "¡Nos vemos! espero haber sido de ayuda. Cuídate."
  - text: "Hasta la próxima, espero haber resuelto tus dudas."
  - text: "Nos vemos, futuro ingeniero."
  - text: "¡Adiós! saludos cordiales."
  - text: "¡Hasta luego! espero haberte ayudado."
  - text: "¡Adiosito! gracias por usar Bit, tu asistente virtual de la FIEE."
  - text: "De acuerdo, ¡espero que tengas un bonito día!"
  - text: "Hasta pronto, cualquier duda, puedes preguntarme en cualquier momento."
  - text: "Bye bye!"
  - text: "Entendido, ¡que tengas un buen día!"
  - text: "Vale, nos vemos. ¡a seguir dándole al semestre!"
  - text: "¡Chau! Nos vemos luego."
  - text: "¡Ánimo, Ingeniero! Nos vemos."
  - text: "¡Listo! Cualquier cosa, aquí me encuentras."
  - text: "Venga, ¡un saludo y suerte en el examen!"
  - text: "¡Nos hablamos! Que te vaya bien con las tareas."
  - text: "Listo, ¡pásala bien en tu día!"
  - text: "¡Ya te dejo! No olvides seguir dándolo todo en el semestre."
  - text: "Cuídate, ¡hasta la próxima!"
  - text: "¡Suerte en el semestre!"
  - text: "¡Un abrazo! Y recuerda tomar agua."
  - text: "¡Genial! Me desconecto, ¡saludos!."
  - text: "Te dejo, ¡nos vemos!"
  - text: "¡Ándale pues! Aquí andamos."
  - text: "Es todo por mi parte, ¡échale ganas!"
  - text: "¡Ok! Me voy a actualizar mis circuitos."
  - text: "¡Venga! No te rindas con ese código, circuito o programa que estés trabajando."
  - text: "¡Hasta la vista, baby!"
  - text: "Me despido, ¡no faltes a clase!"
  - text: "¡Adiós y no olvides tu calculadora!"
  - text: "¡A seguir programando! ¡Chao!"
  - text: "Pura vida, ¡hasta la próxima!"
  - text: "Ya sabes, cualquier duda me avisas. ¡Adiós!"
  - text: "¡Vámonos! ¡Que te diviertas!"
  - text: "Sale, mi estimado. ¡Nos vemos!"
  - text: "¡Listo! Que la fuerza de la electrónica te acompañe."
  - text: "¡Te veo luego! ¡Bye!"
  - text: "Es hora de irme a debuggear, ¡Hasta luego!."
  - text: "¡Adiós! Y no dejes tus tareas para el final."
  - text: "Listo, ¡a darle con todo en el parcial!"
  - text: "Ya, me desconecto, ¡saludos a la banda!"
  - text: "¡Éxito, mi inge!"
  - text: "¡Perfecto! Me despido."
  - text: "¡Estamos en contacto! ¡Bye!"
  - text: "¡A darle! Nos vemos pronto."
  - text: "¡Un gustazo! ¡Que tengas buen día!"
  - text: "¡A seguir haciendo ese código!"
  - text: "¡Éxito con tus proyectos!"
  - text: "¡A por ese 10! ¡Adiós!"
  - text: "¡Que te vaya de lujo!"
  - text: "¡Me desconecto! Un saludo fuerte."
  - text: "¡Ya me toca descansar! ¡Chao!"
  - text: "¡Éxito, campeón/campeona!"
  - text: "¡Adiós! Y recuerda dormir."
  - text: "Listo, nos vemos en la próxima clase."
  - text: "¡Dale! Me avisas si necesitas algo más."
  - text: "¡Me despido! Que la inspiración te llegue."
  - text: "¡A seguir aprendiendo! ¡Bye!"
  - text: "¡Te veo después!"
  - text: "¡Me fui! ¡Cuídate!"
  - text: "¡Ok! Que tu día esté lleno de energía."
  - text: "¡Listo! Nos vemos en el LAN center."
  - text: "¡Vale! A seguir rockeando el semestre."

