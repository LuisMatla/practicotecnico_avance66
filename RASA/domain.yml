  utter_ask_for_BajaDefinitiva:
  - text: "La Baja Definitiva es la privación total de los derechos de inscripción en un programa educativo y prohíbe el ingreso a cualquier otro programa que otorgue el mismo título o grado (Art. 39, 40, 41).\n\nPROCEDIMIENTO:\nLa solicitud (cuando es voluntaria) se realiza por escrito a la Secretaría de la Facultad o Entidad Académica.\n\nCAUSAS PRINCIPALES (No Voluntarias):\n- Agotar oportunidades de inscripción.\n- Reprobar 2 o más materias en examen extraordinario en segunda inscripción.\n- Reprobar examen de última oportunidad (donde aplique).\n- Exceder el límite de permanencia del plan de estudios.\n- Exceder el tiempo máximo permitido en baja temporal por período.\n- Omitir inscribirse en dos períodos consecutivos (sin baja temporal).\n- Ser sancionado con expulsión de la entidad o de la Universidad.\n\nhttps://www.uv.mx/estudiantes/tramites-escolares/baja-definitiva/ extraido de"
