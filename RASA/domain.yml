  utter_ask_for_proceso_inscripcion:
  - text: "Para inscripción regular, accede al Canal de Inscripción en Línea del Portal de Estudiantes UV con tu cuenta (zMATRICULA@estudiantes.uv.mx), en la sección \"Inscripción en Línea\" donde registrarás las materias basado en el bloque que se te seleccionó. Observa con detalle que los NRC sean los correctos, así como las materias a cursar. Posteriormente, se te informará la fecha en la que puedes realizar tu pago, que es de suma importancia para concluir tu inscripción. ¿En qué más puedo ayudarte?"
  - text: "El proceso de inscripción regular se realiza a través del Canal de Inscripción en Línea del Portal de Estudiantes UV. Accede con tu cuenta (zMATRICULA@estudiantes.uv.mx) a la sección \"Inscripción en Línea\" y registra las materias según el bloque que se te asignó. Es muy importante que verifiques que los NRC y las materias sean correctos. Después, se te indicará la fecha para realizar el pago, el cual es necesario para completar tu inscripción. ¿Necesitas ayuda con algo más?"
  - text: "Para inscribirte, debes acceder al Canal de Inscripción en Línea del Portal de Estudiantes UV usando tu cuenta (zMATRICULA@estudiantes.uv.mx). En la sección \"Inscripción en Línea\" registrarás las materias correspondientes al bloque que se te seleccionó. Verifica cuidadosamente que los NRC y las materias sean los correctos. Luego, se te comunicará la fecha para efectuar el pago, que es esencial para finalizar tu inscripción. ¿Qué otra información necesitas?"
  - text: "El proceso de inscripción regular consiste en ingresar al Canal de Inscripción en Línea del Portal de Estudiantes UV con tu cuenta (zMATRICULA@estudiantes.uv.mx). En \"Inscripción en Línea\" registrarás las materias del bloque asignado. Revisa detenidamente que los NRC y las materias sean correctos. Posteriormente, recibirás la fecha para realizar el pago, que es fundamental para concluir tu inscripción. ¿Puedo ayudarte con algo más?"
  - text: "Para realizar tu inscripción, accede al Canal de Inscripción en Línea del Portal de Estudiantes UV con tu cuenta (zMATRICULA@estudiantes.uv.mx). En la sección \"Inscripción en Línea\" registrarás las materias según el bloque que se te seleccionó. Asegúrate de verificar que los NRC y las materias sean los adecuados. Después, se te notificará la fecha para hacer el pago, el cual es necesario para completar tu inscripción. ¿En qué más puedo asistirte?"
  - text: "El proceso de inscripción regular se lleva a cabo en el Canal de Inscripción en Línea del Portal de Estudiantes UV. Ingresa con tu cuenta (zMATRICULA@estudiantes.uv.mx) a \"Inscripción en Línea\" y registra las materias del bloque asignado. Es crucial que confirmes que los NRC y las materias sean correctos. Luego, se te indicará la fecha para realizar el pago, que es imprescindible para finalizar tu inscripción. ¿Tienes alguna otra pregunta?"

